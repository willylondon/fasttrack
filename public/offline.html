<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>FastTrack Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(20, 184, 166, 0.14), transparent 28%),
          linear-gradient(180deg, #111111 0%, #090909 100%);
        color: #f7f7f7;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }
      .card {
        width: min(100%, 480px);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(22, 22, 22, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.74);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p style="margin-bottom: 12px; font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(255,255,255,0.55);">
        FastTrack
      </p>
      <h1>You’re offline.</h1>
      <p>FastTrack will reconnect when your connection returns. Your installed app shell is still available.</p>
    </main>
  </body>
</html>
